<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>접근 거부 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
  </div>
</nav>

<div class="container text-center mt-5">
  <h1 class="display-1 fw-bold text-danger">403</h1>
  <h4 class="mb-3">접근 권한이 없습니다.</h4>
  <p class="text-muted">이 페이지는 관리자(ADMIN)만 접근할 수 있습니다.</p>
  <a th:href="@{/home}" class="btn btn-primary mt-3">홈으로 돌아가기</a>
</div>

<footer class="text-center text-muted mt-5 mb-3">
  <p th:text="${'학번: 2371377 | 성명: 김민주 | 실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
