<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>상품 수정 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-flex">
        <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
      </form>
    </div>
  </div>
</nav>

<div class="container" style="max-width: 600px;">
  <h4 class="fw-bold mb-4">상품 수정</h4>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">상품명</label>
      <input type="text" class="form-control" name="name" th:value="${productDto.name}"
             th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">가격</label>
      <input type="number" class="form-control" name="price" th:value="${productDto.price}"
             th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{price}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">설명</label>
      <input type="text" class="form-control" name="description" th:value="${productDto.description}"/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">재고</label>
      <input type="number" class="form-control" name="stock" th:value="${productDto.stock}"
             th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{stock}"></div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">수정 완료</button>
      <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
    </div>
  </form>
</div>

<footer class="text-center text-muted mt-5 mb-3">
  <p th:text="${'학번: 2371377 | 성명: 김민주 | 실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
